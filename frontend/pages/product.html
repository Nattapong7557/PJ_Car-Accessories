<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="รายละเอียดสินค้า - AutoParts Pro อุปกรณ์แต่งรถเก๋งคุณภาพสูง">
  <title>รายละเอียดสินค้า - AutoParts Pro</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/pages.css?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <!-- ============================================
       HEADER
       ============================================ -->
  <header class="header" id="header">
    <div class="container">
      <div class="header__top">
        <a href="../index.html" class="header__logo" id="logo-link">
          <img src="../assets/images/logo.png" alt="AutoParts Pro Logo">
          <div class="header__logo-text">
            <span class="header__logo-name">AutoParts</span>
            <span class="header__logo-slogan">Pro Performance</span>
          </div>
        </a>

        <button class="header__menu-toggle" id="menu-toggle" aria-label="เปิดเมนู">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>

        <div class="header__search">
          <form class="header__search-form" id="search-form" action="../index.html">
            <input type="text" class="header__search-input" id="search-input" placeholder="ค้นหาอุปกรณ์แต่งรถ..." aria-label="ค้นหาสินค้า">
            <button type="submit" class="header__search-btn" id="search-btn" aria-label="ค้นหา">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
              </svg>
            </button>
          </form>
        </div>

        <div class="header__actions">
          <button class="header__action" id="login-btn" onclick="showNotification('กรุณาลงชื่อเข้าใช้ที่หน้าหลัก')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <span>ลงชื่อเข้าใช้</span>
          </button>
          
          <a href="cart.html" class="header__action" id="cart-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="21" r="1"/>
              <circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span class="cart-count">(0)</span>
            <span class="header__action-badge" style="display: none;">0</span>
          </a>
        </div>
      </div>

      <nav class="header__nav" id="main-nav" aria-label="เมนูหลัก">
        <ul class="header__nav-list">
          <li class="header__nav-item">
            <a href="../index.html" class="header__nav-link" id="nav-promo">สินค้าโปรโมชั่น</a>
          </li>
          <li class="header__nav-item">
            <a href="../index.html" class="header__nav-link" id="nav-new">สินค้าใหม่</a>
          </li>
          <li class="header__nav-item">
            <a href="../index.html" class="header__nav-link" id="nav-bestseller">สินค้าขายดี</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ============================================
       PRODUCT DETAIL
       ============================================ -->
  <main>
    <section class="product-detail" id="product-detail-section">
      <div class="container">
        <!-- Back Button -->
        <a href="../index.html" class="btn-back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          ย้อนกลับไปหน้าหลัก
        </a>

        <!-- Breadcrumb -->
        <div class="product-detail__breadcrumb" id="breadcrumb">
          <a href="../index.html">หน้าแรก</a>
          <span>/</span>
          <a href="../index.html">สินค้าทั้งหมด</a>
          <span>/</span>
          <span id="breadcrumb-name">Loading...</span>
        </div>

        <div class="product-detail__content">
          <!-- Gallery -->
          <div class="product-detail__gallery" id="gallery">
            <div class="product-detail__main-image" id="main-image">
              <img src="" alt="" id="main-product-image">
            </div>
          </div>

          <!-- Product Info -->
          <div class="product-detail__info" id="product-info">
            <div class="product-detail__brand" id="detail-brand"></div>
            <h1 class="product-detail__name" id="detail-name"></h1>
            
            <div class="product-detail__rating" id="detail-rating">
              <div class="product-detail__stars" id="detail-stars"></div>
              <span class="product-detail__reviews" id="detail-reviews"></span>
            </div>

            <div class="product-detail__price-section" id="detail-price-section">
              <span class="product-detail__price" id="detail-price"></span>
              <span class="product-detail__original-price" id="detail-original-price"></span>
              <span class="product-detail__discount" id="detail-discount"></span>
            </div>

            <p class="product-detail__description" id="detail-description"></p>

            <!-- Quantity -->
            <div class="product-detail__quantity">
              <span class="product-detail__qty-label">จำนวน:</span>
              <div class="product-detail__qty-controls">
                <button class="product-detail__qty-btn" id="qty-minus" onclick="updateQty(-1)">−</button>
                <input type="number" class="product-detail__qty-input" id="qty-input" value="1" min="1" max="99">
                <button class="product-detail__qty-btn" id="qty-plus" onclick="updateQty(1)">+</button>
              </div>
            </div>

            <!-- Actions -->
            <div class="product-detail__actions">
              <button class="product-detail__add-cart" id="add-to-cart-btn" onclick="handleAddToCart()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="9" cy="21" r="1"/>
                  <circle cx="20" cy="21" r="1"/>
                  <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                เพิ่มลงตะกร้า
              </button>
              <button class="product-detail__buy-now" id="buy-now-btn" onclick="handleBuyNow()">
                สั่งซื้อเลย
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================================
         REVIEWS SECTION
         ============================================ -->
    <section class="product-reviews" id="product-reviews-section">
      <div class="container">
        <div class="reviews-container">
          <!-- Reviews List Header -->
          <div class="reviews-header">
            <h2 class="reviews-title">รีวิวจากลูกค้า <span id="reviews-count-badge" class="reviews-count-badge">0</span></h2>
          </div>

          <!-- Reviews List -->
          <div class="reviews-list" id="reviews-list">
            <div class="reviews-loading">กำลังโหลดรีวิว...</div>
          </div>
          
          <!-- Show More Button -->
          <button class="reviews-show-more" id="reviews-show-more" onclick="showAllReviews()" style="display: none;">
            ดูรีวิวทั้งหมด
          </button>

          <!-- Add Review Form -->
          <div class="review-form-container">
            <h3 class="review-form-title">เขียนรีวิวของคุณ</h3>
            <form id="review-form" class="review-form" onsubmit="submitReview(event)">
              <div class="form-group">
                <label>คะแนน (ดาว)</label>
                <div class="star-rating-input" id="star-rating-input">
                  <input type="radio" id="star5" name="rating" value="5" required /><label for="star5" title="5 ดาว">★</label>
                  <input type="radio" id="star4" name="rating" value="4" /><label for="star4" title="4 ดาว">★</label>
                  <input type="radio" id="star3" name="rating" value="3" /><label for="star3" title="3 ดาว">★</label>
                  <input type="radio" id="star2" name="rating" value="2" /><label for="star2" title="2 ดาว">★</label>
                  <input type="radio" id="star1" name="rating" value="1" /><label for="star1" title="1 ดาว">★</label>
                </div>
              </div>
              <div class="form-group">
                <label for="review-comment">ประสบการณ์การใช้งานของคุณ (ไม่บังคับ)</label>
                <textarea id="review-comment" class="form-input form-textarea" placeholder="แบ่งปันความคิดเห็นเกี่ยวกับคุณภาพสินค้า การจัดส่ง หรือการบริการ..." rows="5"></textarea>
              </div>
              <button type="submit" class="review-submit-btn">ส่งรีวิว</button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ============================================
       FOOTER
       ============================================ -->
  <footer class="footer" id="footer">
    <div class="container">
      <div class="footer__bottom">
        <p class="footer__copyright">© 2026 AutoParts Pro. สงวนลิขสิทธิ์ทุกประการ</p>
        <div class="footer__payments">
          <div class="footer__payment-icon">VISA</div>
          <div class="footer__payment-icon">MC</div>
          <div class="footer__payment-icon">PP</div>
          <div class="footer__payment-icon">COD</div>
        </div>
      </div>
    </div>
  </footer>

  <!-- Back to Top -->
  <button class="back-to-top" id="back-to-top" aria-label="กลับไปด้านบน">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>

  <script src="../js/app.js"></script>
  <script>
    // Product Detail Page Logic
    let currentProduct = null;

    function getProductIdFromURL() {
      const params = new URLSearchParams(window.location.search);
      return parseInt(params.get('id'));
    }

    async function loadProduct() {
      const id = getProductIdFromURL();

      try {
        const response = await fetch(`/api/products/${id}`);
        const result = await response.json();
        currentProduct = result && result.success && result.data ? result.data : null;
      } catch (error) {
        console.error('Failed to load product detail:', error);
        currentProduct = null;
      }
      
      if (!currentProduct) {
        document.querySelector('.product-detail .container').innerHTML = `
          <div class="empty-state">
            <div class="empty-state__icon">😔</div>
            <h2 class="empty-state__title">ไม่พบสินค้า</h2>
            <p class="empty-state__text">สินค้าที่คุณค้นหาไม่มีในระบบ</p>
            <a href="../index.html" class="empty-state__action">กลับหน้าหลัก</a>
          </div>
        `;
        return;
      }

      // Update page title
      document.title = `${currentProduct.name} - AutoParts Pro`;

      // Breadcrumb
      document.getElementById('breadcrumb-name').textContent = currentProduct.name;

      // Image
      const img = document.getElementById('main-product-image');
      img.src = `../${currentProduct.image}`;
      img.alt = currentProduct.name;

      // Info
      document.getElementById('detail-brand').textContent = currentProduct.brand;
      document.getElementById('detail-name').textContent = currentProduct.name;
      document.getElementById('detail-price').textContent = `฿${Number(currentProduct.price).toLocaleString()}`;
      document.getElementById('detail-description').textContent = currentProduct.description;

      // Original price & discount
      const origEl = document.getElementById('detail-original-price');
      const discEl = document.getElementById('detail-discount');
      if (currentProduct.originalPrice) {
        origEl.textContent = `฿${Number(currentProduct.originalPrice).toLocaleString()}`;
        const discount = Math.round((1 - Number(currentProduct.price) / Number(currentProduct.originalPrice)) * 100);
        discEl.textContent = `-${discount}%`;
      } else {
        origEl.style.display = 'none';
        discEl.style.display = 'none';
      }

      // Stars
      const starsContainer = document.getElementById('detail-stars');
      starsContainer.innerHTML = Array(5).fill('').map((_, i) => {
        const filled = i < Math.floor(Number(currentProduct.rating || 0));
        return `<svg viewBox="0 0 24 24" fill="${filled ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>`;
      }).join('');

      document.getElementById('detail-reviews').textContent = `${Number(currentProduct.rating || 0)} (${Number(currentProduct.reviews || 0)} รีวิว)`;
    }

    function updateQty(delta) {
      const input = document.getElementById('qty-input');
      let val = parseInt(input.value) + delta;
      val = Math.max(1, Math.min(99, val));
      input.value = val;
    }

    function handleAddToCart() {
      if (!currentProduct) return;
      const qty = parseInt(document.getElementById('qty-input').value);
      addToCart(currentProduct.id, qty, currentProduct);
    }

    function handleBuyNow() {
      handleAddToCart();
      setTimeout(() => {
        window.location.href = 'cart.html';
      }, 500);
    }

    // ==========================================
    // REVIEWS LOGIC
    // ==========================================
    let allReviews = [];
    let showingAllReviews = false;

    async function loadReviews() {
      const id = getProductIdFromURL();
      try {
        const res = await fetch(`/api/products/${id}/reviews`);
        const data = await res.json();
        if (data.success) {
          allReviews = data.data;
          renderReviews();
          document.getElementById('reviews-count-badge').textContent = data.count;
        }
      } catch (error) {
        console.error('Failed to load reviews:', error);
        document.getElementById('reviews-list').innerHTML = '<div class="reviews-empty">ไม่สามารถโหลดรีวิวได้</div>';
      }
    }

    function renderReviews() {
      const listEl = document.getElementById('reviews-list');
      const showMoreBtn = document.getElementById('reviews-show-more');
      
      if (!allReviews || allReviews.length === 0) {
        listEl.innerHTML = '<div class="reviews-empty">ยังไม่มีรีวิวสำหรับสินค้านี้ มาเป็นคนแรกที่รีวิวกันเถอะ!</div>';
        showMoreBtn.style.display = 'none';
        return;
      }

      const displayReviews = showingAllReviews ? allReviews : allReviews.slice(0, 3);
      
      listEl.innerHTML = displayReviews.map(review => {
        const stars = Array(5).fill('').map((_, i) => {
          const filled = i < Math.floor(Number(review.rating));
          return `<span class="review-star ${filled ? 'filled' : ''}">★</span>`;
        }).join('');
        
        const date = new Date(review.created_at).toLocaleDateString('th-TH', {
          year: 'numeric', month: 'short', day: 'numeric'
        });

        return `
          <div class="review-card">
            <div class="review-card__header">
              <div class="review-card__avatar">${review.user_name.charAt(0).toUpperCase()}</div>
              <div class="review-card__info">
                <h4 class="review-card__name">${review.user_name}</h4>
                <div class="review-card__date">${date}</div>
              </div>
              <div class="review-card__rating">${stars}</div>
            </div>
            ${review.comment ? `<p class="review-card__comment">${review.comment}</p>` : ''}
          </div>
        `;
      }).join('');

      if (allReviews.length > 3 && !showingAllReviews) {
        showMoreBtn.style.display = 'block';
      } else {
        showMoreBtn.style.display = 'none';
      }
    }

    function showAllReviews() {
      showingAllReviews = true;
      renderReviews();
    }

    async function submitReview(e) {
      e.preventDefault();
      
      const id = getProductIdFromURL();
      const ratingInput = document.querySelector('input[name="rating"]:checked');
      if (!ratingInput) {
        alert('กรุณาให้คะแนนดาว');
        return;
      }
      
      const rating = parseInt(ratingInput.value);
      
      // Fetch user name from localStorage
      let user_name = "สมาชิก AutoParts Pro";
      try {
        const storedUser = localStorage.getItem('currentUser');
        if (storedUser) {
          const userObj = JSON.parse(storedUser);
          if (userObj && userObj.name) {
            user_name = userObj.name;
          }
        }
      } catch (err) {
        console.error('Error parsing user data:', err);
      }
      
      const comment = document.getElementById('review-comment').value;

      const btn = document.querySelector('.review-submit-btn');
      btn.textContent = 'กำลังส่ง...';
      btn.disabled = true;

      try {
        const res = await fetch(`/api/products/${id}/reviews`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_name, rating, comment })
        });
        const data = await res.json();
        
        if (data.success) {
          showNotification('ขอบคุณสำหรับรีวิวครับ!');
          document.getElementById('review-form').reset();
          // Reload product details to update average rating and reload reviews
          loadProduct();
          loadReviews();
        } else {
          alert(data.message || 'เกิดข้อผิดพลาดในการส่งรีวิว');
        }
      } catch (error) {
        console.error('Failed to submit review:', error);
        alert('ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้');
      } finally {
        btn.textContent = 'ส่งรีวิว';
        btn.disabled = false;
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadProduct();
      loadReviews();
      updateCartCount();
      
      // Back to top
      const backToTop = document.getElementById('back-to-top');
      if (backToTop) {
        window.addEventListener('scroll', () => {
          backToTop.classList.toggle('visible', window.scrollY > 400);
        });
        backToTop.addEventListener('click', () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }
    });
  </script>
</body>
</html>
