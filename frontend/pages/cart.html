<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ตะกร้าสินค้า - AutoParts Pro อุปกรณ์แต่งรถเก๋งคุณภาพสูง">
  <title>ตะกร้าสินค้า - AutoParts Pro</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/pages.css?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <!-- ============================================
       HEADER
       ============================================ -->
  <header class="header" id="header">
    <div class="container">
      <div class="header__top">
        <a href="../index.html" class="header__logo" id="logo-link">
          <img src="../assets/images/logo.png" alt="AutoParts Pro Logo">
          <div class="header__logo-text">
            <span class="header__logo-name">AutoParts</span>
            <span class="header__logo-slogan">Pro Performance</span>
          </div>
        </a>

        <button class="header__menu-toggle" id="menu-toggle" aria-label="เปิดเมนู">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>

        <div class="header__search">
          <form class="header__search-form" id="search-form" action="../index.html">
            <input type="text" class="header__search-input" id="search-input" placeholder="ค้นหาอุปกรณ์แต่งรถ..." aria-label="ค้นหาสินค้า">
            <button type="submit" class="header__search-btn" id="search-btn" aria-label="ค้นหา">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
              </svg>
            </button>
          </form>
        </div>

        <div class="header__actions">
          <a href="../index.html" class="header__action" id="home-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span>หน้าหลัก</span>
          </a>
          
          <a href="cart.html" class="header__action" id="cart-link" style="color: var(--color-accent-primary);">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="21" r="1"/>
              <circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span class="cart-count">(0)</span>
          </a>
        </div>
      </div>

      <nav class="header__nav" id="main-nav" aria-label="เมนูหลัก">
        <ul class="header__nav-list">
          <li class="header__nav-item">
            <a href="../index.html" class="header__nav-link" id="nav-promo">สินค้าโปรโมชั่น</a>
          </li>
          <li class="header__nav-item">
            <a href="../index.html" class="header__nav-link" id="nav-new">สินค้าใหม่</a>
          </li>
          <li class="header__nav-item">
            <a href="../index.html" class="header__nav-link" id="nav-bestseller">สินค้าขายดี</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ============================================
       CART PAGE
       ============================================ -->
  <main>
    <section class="cart-page" id="cart-section">
      <div class="container">
        <h1 class="cart-page__title" id="cart-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 28px; height: 28px;">
            <circle cx="9" cy="21" r="1"/>
            <circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          ตะกร้าสินค้า
        </h1>

        <div class="cart-page__content" id="cart-content">
          <!-- Cart Items -->
          <div class="cart-items" id="cart-items">
            <!-- Rendered by JavaScript -->
          </div>

          <!-- Cart Summary -->
          <div class="cart-summary" id="cart-summary">
            <h2 class="cart-summary__title">สรุปคำสั่งซื้อ</h2>
            <div class="cart-summary__row">
              <span>ราคาสินค้า</span>
              <span id="subtotal">฿0</span>
            </div>
            <div class="cart-summary__row">
              <span>ค่าจัดส่ง</span>
              <span id="shipping">ฟรี</span>
            </div>
            <div class="cart-summary__row">
              <span>ส่วนลด</span>
              <span id="discount-amount" style="color: var(--color-green);">-฿0</span>
            </div>
            <div class="cart-summary__row">
              <span>ภาษีมูลค่าเพิ่ม (VAT 7%)</span>
              <span id="vat-amount">฿0</span>
            </div>
            <div class="cart-summary__row cart-summary__row--total">
              <span>ยอดรวมทั้งสิ้น</span>
              <span id="total">฿0</span>
            </div>
            <button class="cart-summary__checkout" id="checkout-btn" onclick="handleCheckout()">
              ดำเนินการสั่งซื้อ
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ============================================
       FOOTER
       ============================================ -->
  <footer class="footer" id="footer">
    <div class="container">
      <div class="footer__bottom">
        <p class="footer__copyright">© 2026 AutoParts Pro. สงวนลิขสิทธิ์ทุกประการ</p>
        <div class="footer__payments">
          <div class="footer__payment-icon">VISA</div>
          <div class="footer__payment-icon">MC</div>
          <div class="footer__payment-icon">PP</div>
          <div class="footer__payment-icon">COD</div>
        </div>
      </div>
    </div>
  </footer>

  <script src="../js/app.js"></script>
  <script>
    // Cart Page Logic
    function renderCartPage() {
      const cartItems = document.getElementById('cart-items');
      const cartContent = document.getElementById('cart-content');
      
      if (!cartItems) return;

      if (cart.length === 0) {
        cartContent.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-state__icon">🛒</div>
            <h2 class="empty-state__title">ตะกร้าสินค้าว่าง</h2>
            <p class="empty-state__text">คุณยังไม่มีสินค้าในตะกร้า เลือกซื้อสินค้ากันเลย!</p>
            <a href="../index.html" class="empty-state__action">เลือกซื้อสินค้า</a>
          </div>
        `;
        return;
      }

      cartItems.innerHTML = cart.map(item => `
        <div class="cart-item" id="cart-item-${item.id}">
          <div class="cart-item__image">
            <img src="../${item.image}" alt="${item.name}">
          </div>
          <div class="cart-item__details">
            <div>
              <h3 class="cart-item__name">${item.name}</h3>
              <p class="cart-item__meta">${item.brand} | จำนวน: ${item.quantity}</p>
            </div>
            <div class="cart-item__bottom">
              <div style="display: flex; align-items: center; gap: 12px;">
                <div class="product-detail__qty-controls">
                  <button type="button" class="product-detail__qty-btn" onclick="changeCartQty(${item.id}, -1)">−</button>
                  <input type="number" class="product-detail__qty-input" value="${item.quantity}" min="1" readonly style="width: 50px;">
                  <button type="button" class="product-detail__qty-btn" onclick="changeCartQty(${item.id}, 1)">+</button>
                </div>
                <span class="cart-item__price">฿${(item.price * item.quantity).toLocaleString()}</span>
              </div>
              <button class="cart-item__remove" onclick="removeCartItem(${item.id})">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px; height: 14px;">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
                ลบ
              </button>
            </div>
          </div>
        </div>
      `).join('');

      updateCartSummary();
    }

    function updateCartSummary() {
      const subtotal = getCartTotal();
      const shipping = subtotal >= 2000 ? 0 : 150;
      const discount = 0;
      const vat = Math.round((subtotal - discount) * 0.07);
      const total = subtotal + shipping - discount + vat;

      document.getElementById('subtotal').textContent = `฿${subtotal.toLocaleString()}`;
      document.getElementById('shipping').textContent = shipping === 0 ? 'ฟรี' : `฿${shipping}`;
      document.getElementById('discount-amount').textContent = `-฿${discount.toLocaleString()}`;
      document.getElementById('vat-amount').textContent = `฿${vat.toLocaleString()}`;
      document.getElementById('total').textContent = `฿${total.toLocaleString()}`;
    }

    function changeCartQty(productId, delta) {
      const item = cart.find(i => String(i.id) === String(productId));
      if (item) {
        item.quantity = Math.max(1, item.quantity + delta);
        saveCart();
        renderCartPage();
      }
    }

    function setCartQty(productId, value) {
      const qty = parseInt(value, 10);
      if (Number.isFinite(qty) && qty >= 1) {
        updateCartQuantity(productId, qty);
      }
      // Always re-render so an invalid/empty entry snaps back to the real (valid) quantity
      renderCartPage();
    }

    function removeCartItem(productId) {
      removeFromCart(productId);
      renderCartPage();
      showNotification('ลบสินค้าออกจากตะกร้าแล้ว');
    }

    function handleCheckout() {
      if (cart.length === 0) {
        showNotification('ตะกร้าสินค้าว่าง กรุณาเพิ่มสินค้า');
        return;
      }
      showNotification('🎉 ระบบชำระเงินจะเปิดให้บริการเร็วๆ นี้!');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderCartPage();
      updateCartCount();
    });
  </script>
</body>
</html>
