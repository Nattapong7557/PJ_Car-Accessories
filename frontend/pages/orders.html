<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายการสั่งซื้อ - AutoParts Pro</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .orders-container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }
    .orders-header {
      margin-bottom: 30px;
    }
    .orders-header h1 {
      font-size: 28px;
      color: var(--color-text-primary);
      margin-bottom: 0;
    }
    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 2px solid var(--color-accent-primary);
      background: rgba(255, 107, 53, 0.05);
      color: var(--color-accent-primary);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      flex-shrink: 0;
    }
    .back-btn svg {
      width: 20px;
      height: 20px;
    }
    .back-btn:hover {
      background: var(--color-accent-primary);
      color: #fff;
      transform: translateX(-4px);
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
    }
    .order-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--color-border);
    }
    .order-id {
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .order-status {
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .order-status.pending {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
    }
    .order-status.processing {
      background: rgba(33, 150, 243, 0.2);
      color: #2196f3;
    }
    .order-status.completed {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
    }
    .order-status.cancelled {
      background: rgba(230, 57, 70, 0.2);
      color: #e63946;
    }
    .order-customer {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      margin-top: 4px;
    }
    .manager-controls {
      display: none;
      margin-bottom: 24px;
    }
    .manager-controls__row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .manager-controls__row input,
    .manager-controls__row select {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-card);
      color: var(--color-text-primary);
      font-size: 0.9rem;
    }
    .manager-controls__row input {
      flex: 1;
      min-width: 220px;
    }
    .order-status-update {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px dashed var(--color-border);
      flex-wrap: wrap;
    }
    .order-status-update label {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
    }
    .order-status-update select {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-card);
      color: var(--color-text-primary);
      font-size: 0.85rem;
    }
    .btn-save-status {
      padding: 8px 20px;
      font-size: 0.85rem;
      border: none;
      border-radius: 6px;
      background: var(--color-accent-primary);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .btn-save-status:hover {
      background: #ff8c5a;
    }
    .btn-save-status[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .status-msg {
      font-size: 0.8rem;
    }
    .order-cancel-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px dashed var(--color-border);
      flex-wrap: wrap;
    }
    .btn-cancel-order {
      padding: 8px 20px;
      font-size: 0.85rem;
      border: 1.5px solid #e63946;
      border-radius: 6px;
      background: transparent;
      color: #e63946;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-cancel-order:hover {
      background: #e63946;
      color: #fff;
    }
    .btn-cancel-order[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .order-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .order-info-item {
      font-size: 0.9rem;
      color: var(--color-text-secondary);
    }
    .order-info-label {
      font-size: 0.8rem;
      color: var(--color-text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .empty-orders {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-orders-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    .empty-orders-text {
      color: var(--color-text-secondary);
      margin-bottom: 24px;
    }
    .btn-shop {
      display: inline-block;
      background: var(--color-accent-primary);
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-shop:hover {
      background: #ff8c5a;
    }
    @media (max-width: 768px) {
      .order-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">AUTOPARTS PRO</div>
  </div>

  <!-- Header -->
  <header class="header" id="header">
    <div class="container">
      <div class="header__top">
        <a href="../index.html" class="header__logo">
          <img src="../assets/images/logo.png" alt="AutoParts Pro Logo">
          <div class="header__logo-text">
            <span class="header__logo-name">AutoParts</span>
            <span class="header__logo-slogan">Pro Performance</span>
          </div>
        </a>
        <button class="header__menu-toggle" id="menu-toggle" aria-label="เปิดเมนู">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
        <div class="header__actions">
          <button class="header__action" id="login-btn"></button>
          <a href="cart.html" class="header__action" id="cart-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="21" r="1"/>
              <circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span class="cart-count">(0)</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- Orders Section -->
  <main class="orders-container">
    <div class="orders-header">
      <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 8px;">
        <a href="../index.html" class="back-btn" aria-label="กลับไปหน้าหลัก">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </a>
        <h1>รายการสั่งซื้อของฉัน</h1>
      </div>
      <p style="color: var(--color-text-secondary); margin-left: 56px;">ดูรายละเอียดการสั่งซื้อและสถานะการจัดส่ง</p>
    </div>

    <div class="manager-controls" id="managerControls">
      <div class="manager-controls__row">
        <input type="text" id="orderSearchInput" placeholder="ค้นหาชื่อ หรือ อีเมลลูกค้า...">
        <select id="orderStatusFilter">
          <option value="all">สถานะทั้งหมด</option>
          <option value="pending">รอจัดส่ง</option>
          <option value="processing">กำลังจัดส่ง</option>
          <option value="completed">สำเร็จ</option>
          <option value="cancelled">ยกเลิก</option>
        </select>
      </div>
    </div>

    <div id="ordersContent">
      <div class="empty-orders">
        <div class="empty-orders-icon">📦</div>
        <h3 style="color: var(--color-text-primary); margin-bottom: 8px;">ยังไม่มีการสั่งซื้อ</h3>
        <p class="empty-orders-text">คุณยังไม่มีการสั่งซื้อสินค้า</p>
        <a href="../index.html" class="btn-shop">เลือกซื้อสินค้า</a>
      </div>
    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script>
    // Check if user is logged in
    document.addEventListener('DOMContentLoaded', () => {
      if (!isUserLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }

      updateAuthUI();

      const currentUser = getCurrentUser();

      if (isManagerOrAdmin(currentUser)) {
        // Manager / Admin: เห็นออเดอร์ของลูกค้าทุกคน และปรับสถานะการจัดส่งได้
        document.querySelector('.orders-header h1').textContent = 'จัดการออเดอร์ทั้งหมด';
        const subtitle = document.querySelector('.orders-header p');
        if (subtitle) subtitle.textContent = 'ดูออเดอร์ของลูกค้าทั้งหมดและปรับสถานะการจัดส่ง';

        const controls = document.getElementById('managerControls');
        if (controls) controls.style.display = 'block';

        document.getElementById('orderSearchInput')?.addEventListener('input', renderManagerOrders);
        document.getElementById('orderStatusFilter')?.addEventListener('change', renderManagerOrders);

        loadAllOrders();
      } else {
        // User ทั่วไป: เห็นเฉพาะออเดอร์ของตัวเอง
        loadOrders();
      }
    });

    async function loadOrders() {
      try {
        const token = getAuthToken();
        const response = await fetch('/api/orders', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (!response.ok) {
          throw new Error('Failed to load orders');
        }

        const data = await response.json();
        displayOrders(data.data || []);
      } catch (error) {
        console.error('Error loading orders:', error);
      }
    }

    // ============================================
    // Manager / Admin: ดูออเดอร์ทั้งหมด + ปรับสถานะ
    // ============================================
    let managerOrdersCache = [];

    async function loadAllOrders() {
      const content = document.getElementById('ordersContent');
      content.innerHTML = `
        <div class="empty-orders">
          <div class="empty-orders-icon">⏳</div>
          <p class="empty-orders-text">กำลังโหลดออเดอร์ทั้งหมด...</p>
        </div>
      `;

      try {
        const token = getAuthToken();
        const response = await fetch('/api/orders/admin/all', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (!response.ok) {
          if (response.status === 403) {
            throw new Error('คุณไม่มีสิทธิ์เข้าถึงข้อมูลนี้');
          }
          throw new Error('โหลดออเดอร์ไม่สำเร็จ');
        }

        const data = await response.json();
        managerOrdersCache = data.data || [];
        renderManagerOrders();
      } catch (error) {
        console.error('Error loading all orders:', error);
        content.innerHTML = `
          <div class="empty-orders">
            <div class="empty-orders-icon">⚠️</div>
            <h3 style="color: var(--color-text-primary); margin-bottom: 8px;">โหลดออเดอร์ไม่สำเร็จ</h3>
            <p class="empty-orders-text">${escapeOrderHtml(error.message)}</p>
          </div>
        `;
      }
    }

    function renderManagerOrders() {
      const content = document.getElementById('ordersContent');
      const search = (document.getElementById('orderSearchInput')?.value || '').toLowerCase().trim();
      const statusFilter = document.getElementById('orderStatusFilter')?.value || 'all';

      const list = managerOrdersCache.filter(order => {
        const name = (order.user_name || order.customer_name || order.name || '').toLowerCase();
        const email = (order.user_email || order.customer_email || order.email || '').toLowerCase();
        const matchesSearch = !search || name.includes(search) || email.includes(search);
        const matchesStatus = statusFilter === 'all' || order.status === statusFilter;
        return matchesSearch && matchesStatus;
      });

      if (!list.length) {
        content.innerHTML = `
          <div class="empty-orders">
            <div class="empty-orders-icon">📦</div>
            <h3 style="color: var(--color-text-primary); margin-bottom: 8px;">ไม่พบออเดอร์</h3>
            <p class="empty-orders-text">ไม่มีออเดอร์ที่ตรงกับเงื่อนไขการค้นหา</p>
          </div>
        `;
        return;
      }

      const statusLabels = {
        pending: 'รอจัดส่ง',
        processing: 'กำลังจัดส่ง',
        completed: 'สำเร็จ',
        cancelled: 'ยกเลิก'
      };

      const sortedOrders = [...list].sort((a, b) =>
        new Date(b.created_at || b.createdAt) - new Date(a.created_at || a.createdAt)
      );

      content.innerHTML = sortedOrders.map(order => {
        const id = order.id ?? order._id;
        const customerName = order.user_name || order.customer_name || order.name || 'ไม่ทราบชื่อ';
        const customerEmail = order.user_email || order.customer_email || order.email || '';

        return `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-id">ออเดอร์ #${escapeOrderHtml(id)}</div>
              <div class="order-customer">${escapeOrderHtml(customerName)}${customerEmail ? ' · ' + escapeOrderHtml(customerEmail) : ''}</div>
            </div>
            <span class="order-status ${order.status}">${statusLabels[order.status] || order.status}</span>
          </div>
          <div class="order-info">
            <div class="order-info-item">
              <div class="order-info-label">วันสั่งซื้อ</div>
              <div>${new Date(order.created_at || order.createdAt).toLocaleDateString('th-TH')}</div>
            </div>
            <div class="order-info-item">
              <div class="order-info-label">จำนวนรวม</div>
              <div>฿${order.total_amount || order.totalAmount || 0}</div>
            </div>
            <div class="order-info-item">
              <div class="order-info-label">จำนวนสินค้า</div>
              <div>${order.items?.length || 0} ชิ้น</div>
            </div>
          </div>
          <div class="order-items-list" style="margin-top: 20px; border-top: 1px dashed var(--color-border); padding-top: 16px;">
            <div class="order-info-label" style="margin-bottom: 12px;">รายการสินค้า</div>
            ${(order.items || []).map(item => `
              <div class="order-item" style="display: flex; gap: 16px; margin-bottom: 12px; align-items: center;">
                <img src="../${item.image}" alt="${item.name}" onerror="this.src='../assets/images/placeholder.jpg'" style="width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid var(--color-border); background: #fff;">
                <div>
                  <div style="font-weight: 600; color: var(--color-text-primary); font-size: 0.95rem; margin-bottom: 4px;">${item.name}</div>
                  <div style="font-size: 0.85rem; color: var(--color-text-secondary);">จำนวน: ${item.quantity} ชิ้น | ราคาต่อชิ้น: ฿${item.price}</div>
                </div>
              </div>
            `).join('')}
          </div>
          <div class="order-status-update">
            <label for="status-select-${id}">ปรับสถานะการจัดส่ง:</label>
            <select id="status-select-${id}">
              <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>รอจัดส่ง</option>
              <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>กำลังจัดส่ง</option>
              <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>สำเร็จ</option>
              <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>ยกเลิก</option>
            </select>
            <button type="button" class="btn-save-status" id="save-btn-${id}" onclick="updateOrderStatus('${id}')">บันทึกสถานะ</button>
            <span class="status-msg" id="status-msg-${id}"></span>
          </div>
        </div>
        `;
      }).join('');
    }

    async function updateOrderStatus(id) {
      const select = document.getElementById(`status-select-${id}`);
      const button = document.getElementById(`save-btn-${id}`);
      const msg = document.getElementById(`status-msg-${id}`);
      const newStatus = select.value;

      button.disabled = true;
      button.textContent = 'กำลังบันทึก...';

      try {
        const token = getAuthToken();
        const response = await fetch(`/api/orders/${id}/status`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ status: newStatus })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.message || 'อัปเดตสถานะไม่สำเร็จ');
        }

        const order = managerOrdersCache.find(o => String(o.id ?? o._id) === String(id));
        if (order) order.status = newStatus;

        if (msg) {
          msg.style.color = '#4caf50';
          msg.textContent = 'บันทึกสำเร็จ';
        }

        renderManagerOrders();
      } catch (error) {
        console.error('Error updating order status:', error);
        if (msg) {
          msg.style.color = '#e63946';
          msg.textContent = error.message;
        }
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = 'บันทึกสถานะ';
        }
      }
    }

    function escapeOrderHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function displayOrders(orders) {
      const content = document.getElementById('ordersContent');
      
      if (!orders || orders.length === 0) {
        content.innerHTML = `
          <div class="empty-orders">
            <div class="empty-orders-icon">📦</div>
            <h3 style="color: var(--color-text-primary); margin-bottom: 8px;">ยังไม่มีการสั่งซื้อ</h3>
            <p class="empty-orders-text">คุณยังไม่มีการสั่งซื้อสินค้า</p>
            <a href="../index.html" class="btn-shop">เลือกซื้อสินค้า</a>
          </div>
        `;
        return;
      }

      const statusLabels = {
        pending: 'รอจัดส่ง',
        processing: 'กำลังจัดส่ง',
        completed: 'สำเร็จ',
        cancelled: 'ยกเลิก'
      };

      // Reverse orders so that oldest (#1) comes first in display list
      const sortedOrders = [...orders].reverse();

      content.innerHTML = sortedOrders.map((order, index) => {
        const id = order.id ?? order._id;
        return `
        <div class="order-card">
          <div class="order-header">
            <div class="order-id">สั่งซื้อสำเร็จ</div>
            <span class="order-status ${order.status}">${statusLabels[order.status] || order.status}</span>
          </div>
          <div class="order-info">
            <div class="order-info-item">
              <div class="order-info-label">วันสั่งซื้อ</div>
              <div>${new Date(order.created_at || order.createdAt).toLocaleDateString('th-TH')}</div>
            </div>
            <div class="order-info-item">
              <div class="order-info-label">จำนวนรวม</div>
              <div>฿${order.total_amount || order.totalAmount || 0}</div>
            </div>
            <div class="order-info-item">
              <div class="order-info-label">จำนวนสินค้า</div>
              <div>${order.items?.length || 0} ชิ้น</div>
            </div>
          </div>
          <div class="order-items-list" style="margin-top: 20px; border-top: 1px dashed var(--color-border); padding-top: 16px;">
            <div class="order-info-label" style="margin-bottom: 12px;">รายการสินค้า</div>
            ${(order.items || []).map(item => `
              <div class="order-item" style="display: flex; gap: 16px; margin-bottom: 12px; align-items: center;">
                <img src="../${item.image}" alt="${item.name}" onerror="this.src='../assets/images/placeholder.jpg'" style="width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid var(--color-border); background: #fff;">
                <div>
                  <div style="font-weight: 600; color: var(--color-text-primary); font-size: 0.95rem; margin-bottom: 4px;">${item.name}</div>
                  <div style="font-size: 0.85rem; color: var(--color-text-secondary);">จำนวน: ${item.quantity} ชิ้น | ราคาต่อชิ้น: ฿${item.price}</div>
                </div>
              </div>
            `).join('')}
          </div>
          ${order.status === 'pending' ? `
          <div class="order-cancel-row">
            <button type="button" class="btn-cancel-order" id="cancel-btn-${id}" onclick="cancelMyOrder('${id}')">ยกเลิกคำสั่งซื้อ</button>
            <span class="status-msg" id="cancel-msg-${id}"></span>
          </div>
          ` : ''}
        </div>
        `;
      }).join('');
    }

    async function cancelMyOrder(id) {
      if (!confirm('ยืนยันยกเลิกคำสั่งซื้อนี้ใช่หรือไม่?')) return;

      const button = document.getElementById(`cancel-btn-${id}`);
      const msg = document.getElementById(`cancel-msg-${id}`);

      if (button) {
        button.disabled = true;
        button.textContent = 'กำลังยกเลิก...';
      }

      try {
        const token = getAuthToken();
        const response = await fetch(`/api/orders/${id}/cancel`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          }
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.message || 'ยกเลิกคำสั่งซื้อไม่สำเร็จ');
        }

        // โหลดรายการใหม่เพื่ออัปเดตสถานะและซ่อนปุ่มยกเลิก
        loadOrders();
      } catch (error) {
        console.error('Error cancelling order:', error);
        if (msg) {
          msg.style.color = '#e63946';
          msg.textContent = error.message;
        } else {
          alert(error.message);
        }
        if (button) {
          button.disabled = false;
          button.textContent = 'ยกเลิกคำสั่งซื้อ';
        }
      }
    }
  </script>
</body>
</html>
