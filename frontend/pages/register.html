<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก - AutoParts Pro</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-container">
    <a href="../index.html" class="auth-brand" style="text-decoration:none;">
      <img src="../assets/images/logo.png" alt="AutoParts Pro" class="auth-brand__logo">
      <div class="auth-brand__text">
        <div class="auth-brand__name">AutoParts Pro</div>
        <div class="auth-brand__slogan">สมัครสมาชิกง่าย ๆ</div>
      </div>
    </a>
    <div class="auth-card">
      <a href="login.html" class="auth-back-button">ย้อนกลับ</a>
      <div class="auth-header">
      <div class="auth-header">
        <h1>สมัครสมาชิก</h1>
        <p>สร้างบัญชีใหม่เพื่อเลือกซื้อสินค้า</p>
      </div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="name">ชื่อ - นามสกุล</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            placeholder="กรุณากรอกชื่อของคุณ"
            required
          >
          <span class="error-message" id="nameError"></span>
        </div>

        <div class="form-group">
          <label for="email">อีเมล</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="example@email.com"
            required
          >
          <span class="error-message" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="phone">เบอร์โทรศัพท์</label>
          <input 
            type="tel" 
            id="phone" 
            name="phone" 
            placeholder="0812345678"
          >
          <span class="error-message" id="phoneError"></span>
        </div>

        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="ตั้งรหัสผ่านอย่างน้อย 6 ตัวอักษร"
            required
          >
          <span class="error-message" id="passwordError"></span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">ยืนยันรหัสผ่าน</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            placeholder="กรุณากรอกรหัสผ่านอีกครั้ง"
            required
          >
          <span class="error-message" id="confirmPasswordError"></span>
        </div>

        <div class="form-group checkbox">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">ฉันยอมรับเงื่อนไขการใช้งาน</label>
        </div>

        <button type="submit" class="btn btn-primary btn-submit">
          <span>สมัครสมาชิก</span>
          <span class="loading-spinner" id="loadingSpinner"></span>
        </button>

        <div class="error-alert" id="errorAlert"></div>
        <div class="success-alert" id="successAlert"></div>
      </form>

      <div class="auth-footer">
        <p>มีบัญชีแล้ว? <a href="login.html">เข้าสู่ระบบ</a></p>
        <p><a href="login.html" class="auth-back-link">ย้อนกลับ</a></p>
      </div>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', handleRegister);
  </script>
</body>
</html>
